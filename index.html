<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P-Reinforce Knowledge Graph</title>
    <script src="https://unpkg.com/force-graph"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }
        #header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }
        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats {
            font-size: 0.8rem;
            opacity: 0.6;
            margin-top: 5px;
        }
        #graph {
            width: 100vw;
            height: 100vh;
        }
        .node-label {
            font-size: 12px;
            padding: 2px 5px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 4px;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        button {
            background: rgba(79, 172, 254, 0.2);
            border: 1px solid #4facfe;
            color: #4facfe;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #4facfe;
            color: white;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>P-REINFORCE</h1>
        <div class="stats" id="node-count">Knowledge Nodes: 0</div>
    </div>

    <div id="graph"></div>

    <div id="controls">
        <button onclick="window.location.reload()">Refresh Engine</button>
    </div>

    <script>
        fetch('20_Meta/Graph.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('node-count').innerText = `Knowledge Nodes: ${data.nodes.length}`;
                
                const Graph = ForceGraph()
                (document.getElementById('graph'))
                    .graphData(data)
                    .nodeId('id')
                    .nodeLabel('label')
                    .nodeAutoColorBy('folder')
                    .nodeCanvasObject((node, ctx, globalScale) => {
                        const label = node.label;
                        const fontSize = 14/globalScale;
                        ctx.font = `${fontSize}px Outfit`;
                        const textWidth = ctx.measureText(label).width;
                        const bckgDimensions = [textWidth, fontSize].map(n => n + fontSize * 0.2);

                        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                        ctx.fillRect(node.x - bckgDimensions[0] / 2, node.y - bckgDimensions[1] / 2, ...bckgDimensions);

                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = node.color;
                        ctx.fillText(label, node.x, node.y);

                        node.__bckgDimensions = bckgDimensions;
                    })
                    .nodePointerAreaPaint((node, color, ctx) => {
                        ctx.fillStyle = color;
                        const bckgDimensions = node.__bckgDimensions;
                        bckgDimensions && ctx.fillRect(node.x - bckgDimensions[0] / 2, node.y - bckgDimensions[1] / 2, ...bckgDimensions);
                    })
                    .linkColor(() => 'rgba(255, 255, 255, 0.2)')
                    .linkWidth(1);
            });
    </script>
</body>
</html>
